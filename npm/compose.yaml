services:
  nginxproxymanager:
    image: 'docker.io/jc21/nginx-proxy-manager:latest'
    restart: unless-stopped
    ports:
      - '80:80'
      # - '81:81'
      - '443:443'
    volumes:
      - ./data:/data
      - ./letsencrypt:/etc/letsencrypt
    networks:
      - blackhole
    environment:
      - TZ=Europe/Berlin

networks:
  blackhole:
    external: true
