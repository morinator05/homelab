services:
  netbird-client:
      restart: unless-stopped
      container_name: netbird-client 
      cap_add:
          - NET_ADMIN
          - SYS_ADMIN
          - SYS_RESOURCE
      devices:
          # Required when using userspace mode or when kernel module is not available
          - /dev/net/tun
      network_mode: host
      environment:
          - NB_SETUP_KEY=${SETUP_KEY}
      volumes:
          - netbird-client:/var/lib/netbird
      image: netbirdio/netbird:latest

volumes:
  netbird-client:
      external: true
      name: netbird-client

