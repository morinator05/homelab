services:
  dokuwiki:
    container_name: dokuwiki
    image: dokuwiki/dokuwiki:stable
    user: "1000:1000" 
    restart: unless-stopped
    #ports:
    #  - "8080:8080" 
    environment:
      PHP_TIMEZONE: Europe/Berlin
      #PHP_MEMORYLIMIT: 256M
      #PHP_UPLOADLIMIT: 128M
    volumes:
      - ./storage:/storage
    networks:
      - blackhole

networks:
  blackhole:
    
    external: true
